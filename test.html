<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <title>WebSocket Test</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
      body {
        font-family: Arial;
        padding: 20px;
        max-width: 600px;
        margin: 0 auto;
      }
      input {
        width: 100%;
        padding: 8px;
        margin: 5px 0;
        box-sizing: border-box;
      }
      button {
        padding: 8px 16px;
        margin: 5px;
        cursor: pointer;
      }
      #log {
        background: #f4f4f4;
        padding: 10px;
        height: 300px;
        overflow-y: auto;
        border-radius: 5px;
      }
      .success {
        color: green;
      }
      .error {
        color: red;
      }
      .info {
        color: blue;
      }
    </style>
  </head>
  <body>
    <h2>WebSocket Tester</h2>

    <input id="token" placeholder="accessToken هنا" />
    <button onclick="connect()">اتصال</button>
    <button onclick="disconnect()">قطع الاتصال</button>

    <hr />

    <input id="conversationId" placeholder="Conversation ID" />
    <input id="message" placeholder="الرسالة" />
    <button onclick="sendMessage()">إرسال</button>

    <hr />

    <div id="log"></div>

    <script>
      let socket = null;

      function log(msg, type = 'info') {
        const div = document.getElementById('log');
        div.innerHTML += `<p class="${type}">[${new Date().toLocaleTimeString()}] ${msg}</p>`;
        div.scrollTop = div.scrollHeight;
      }

      function connect() {
        const token = document.getElementById('token').value.trim();
        if (!token) return log('أدخل الـ token أولاً', 'error');

        socket = io('http://localhost:3000/chat', {
          auth: { token },
        });

        socket.on('connect', () => {
          log(`✅ اتصل بنجاح — Socket ID: ${socket.id}`, 'success');
        });
        socket.on('notification', (data) => {
          log(`🔔 إشعار: ${JSON.stringify(data)}`, 'success');
        });

        socket.on('connect_error', (err) => {
          log(`❌ فشل الاتصال: ${err.message}`, 'error');
        });

        socket.on('disconnect', () => {
          log('🔌 قُطع الاتصال', 'error');
        });

        socket.on('new_message', (msg) => {
          log(`📩 رسالة جديدة: ${JSON.stringify(msg)}`, 'success');
        });

        socket.on('error', (err) => {
          log(`❌ خطأ: ${JSON.stringify(err)}`, 'error');
        });
      }

      function disconnect() {
        if (socket) socket.disconnect();
      }

      function sendMessage() {
        if (!socket?.connected) return log('اتصل أولاً', 'error');

        const conversationId = document
          .getElementById('conversationId')
          .value.trim();
        const content = document.getElementById('message').value.trim();

        if (!conversationId || !content)
          return log('أدخل الـ conversation ID والرسالة', 'error');

        socket.emit('send_message', { conversationId, content, type: 'text' });
        log(`📤 أُرسلت: ${content}`, 'info');
      }
    </script>
  </body>
</html>
