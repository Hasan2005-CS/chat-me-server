name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  docker:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/chat-me-server:latest

  deploy:
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Setup SSH key
        run: |
          # Secrets can carry a trailing newline/whitespace if pasted carelessly;
          # trim them so a bad value fails loudly instead of silently splitting commands.
          server_user="$(printf '%s' "${{ secrets.SERVER_USER }}" | tr -d '[:space:]')"
          server_host="$(printf '%s' "${{ secrets.SERVER_HOST }}" | tr -d '[:space:]')"
          echo "SERVER_USER=${server_user}" >> "$GITHUB_ENV"
          echo "SERVER_HOST=${server_host}" >> "$GITHUB_ENV"

          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${server_host}" >> ~/.ssh/known_hosts

      - name: Deploy to DigitalOcean
        run: |
          time ssh -T -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=10 "${SERVER_USER}@${SERVER_HOST}" 'cd ~ && docker compose pull && docker compose up -d && docker image prune -f' < /dev/null